spring.application.name=cart-service

# PostgreSQL connection - separate schema from auth and product services
spring.datasource.url=jdbc:postgresql://localhost:5432/shopkart?currentSchema=cart_schema
spring.datasource.username=shopkart
spring.datasource.password=shopkart123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Run cart-service on its own port
server.port=8082

# Base URL of the Product Service - used by ProductClient to fetch live prices
product.service.url=http://localhost:8081
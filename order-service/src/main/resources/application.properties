spring.application.name=order_service

# PostgreSQL connection - separate schema from other services
spring.datasource.url=jdbc:postgresql://localhost:5432/shopkart?currentSchema=order_schema
spring.datasource.username=shopkart
spring.datasource.password=shopkart123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Run order-service on its own port
server.port=8083

# Kafka configuration - connects to your Docker Kafka container
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Base URL of Product Service - used by ProductClient
product.service.url=http://localhost:8081